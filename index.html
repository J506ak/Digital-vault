<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Digital Vault</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>🔐 Angels simple password manager</h1>
        
        <div class="input-group">
            <input type="text" id="labelInput" placeholder="Label (e.g. Gmail)">
            <input type="password" id="secretInput" placeholder="Password">
            <button onclick="saveSecret()">Save to Vault</button>
        </div>

        <hr>

        <div id="vaultList">
            <h3>Your Saved Logins</h3>
            </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
